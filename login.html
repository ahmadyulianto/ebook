<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Member Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00AAE7; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-wrapper { width: 100%; max-width: 400px; padding: 20px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); }
        .logo-icon { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        .login-title { font-size: 22px; font-weight: 900; color: var(--text); margin: 0 0 5px 0; }
        .login-subtitle { font-size: 13px; color: #64748b; font-weight: 600; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 8px; display: block; text-transform: uppercase; }
        .form-control { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; font-weight: 700; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--primary); }
        
        .btn-login { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 170, 231, 0.3); }
        .btn-login:active { transform: scale(0.98); }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo-icon"><i class="fa-solid fa-circle-user"></i></div>
            <h1 class="login-title">Member Area</h1>
            <p class="login-subtitle">Masuk untuk mengakses produk digital Anda</p>
            
            <div class="form-group">
                <label class="form-label">Username / Nomor WhatsApp</label>
                <input type="text" inputmode="numeric" id="input-wa" class="form-control" placeholder="Contoh: 08123456789" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="input-password" class="form-control" placeholder="Masukkan password" autocomplete="current-password">
            </div>
            
            <button class="btn-login" id="btn-login" onclick="prosesLogin()">Masuk Sekarang</button>
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        // Set warna brand jika ada di local storage
        if (localStorage.getItem('theme_color')) {
            document.documentElement.style.setProperty('--primary', localStorage.getItem('theme_color'));
        }

        const inputWa = document.getElementById('input-wa');
        const inputPassword = document.getElementById('input-password');

        inputWa.addEventListener('input', () => {
            const cleanWa = inputWa.value.replace(/[^0-9]/g, '');
            if (inputWa.value !== cleanWa) inputWa.value = cleanWa;
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') prosesLogin();
        });

        async function prosesLogin() {
            let wa = document.getElementById('input-wa').value;
            let password = document.getElementById('input-password').value;
            if(!wa) return alert("Masukkan Username / Nomor WhatsApp Anda!");
            if(!password) return alert("Masukkan Password Anda!");
            
            // Bersihkan format (hilangkan karakter aneh jika ada)
            wa = wa.replace(/[^0-9]/g, '');

            const btn = document.getElementById('btn-login');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memeriksa...";
            btn.disabled = true;

            try {
                const res = await fetch("/api/user/auth", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "login", whatsapp: wa, password: password })
                });
                
                const data = await res.json();
                
                if (data.status === "success") {
                    // Simpan sesi ke local storage
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    
                    // KUNCI UTAMA: Menyimpan session untuk membuka gembok di akses-pdf.html
                    sessionStorage.setItem('user_email', data.user.whatsapp);
                    sessionStorage.setItem('user_status', 'premium'); 
                    
                    window.location.replace('pesanan-saya.html');
                } else {
                    alert(data.message || "Gagal Login: Username atau password salah. Pastikan data sesuai dengan akun yang tersimpan.");
                    btn.innerText = "Masuk Sekarang";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Terjadi kesalahan koneksi ke server.");
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
